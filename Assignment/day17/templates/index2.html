


<!DOCTYPE html>
<html>
<head>
<title>Visit Counter</title>
</head>
<body>

<h2>Enter Your Name</h2>

<form method="POST">
    <input type="text" name="name" placeholder="Enter name">
    <button type="submit">Submit</button>
</form>

{% if name %}
<h3>Hello {{name}}</h3>
<p>You visited this page {{visit}} times.</p>
{% endif %}

</body>
</html>
