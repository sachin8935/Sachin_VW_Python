<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>🛒 Mini Shopping Website</h2>

<div class="container">

{% for product, price in products.items() %}

<div class="product">
<h3>{{ product }}</h3>
<p>Price: ₹{{ price }}</p>

<a href="/add/{{ product }}">
<button>Add to Cart</button>
</a>

</div>

{% endfor %}

<br>

<a href="/cart">
<button>View Cart</button>
</a>

</div>

</body>
</html>
