<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Dashboard</h1>
            <nav>
                <ul>
                    <li><a href="{{ url_for('admin.manage_users') }}">Manage Users</a></li>
                    <li><a href="{{ url_for('auth.logout') }}">Logout</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section>
                <h2>Welcome, Admin!</h2>
                <p>Here you can manage employees and their roles.</p>
            </section>
            <section>
                <h3>Statistics</h3>
                <p>Total Employees: {{ total_employees }}</p>
                <p>Total Roles: {{ total_roles }}</p>
            </section>
        </main>
    </div>
</body>
</html>
