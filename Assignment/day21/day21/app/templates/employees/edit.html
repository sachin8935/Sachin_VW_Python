{% extends 'base.html' %}

{% block title %}Edit {{ employee.name }} - Employee Portal{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Edit Employee</h2>
    <form method="POST" class="employee-form">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{ employee.name }}" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ employee.email }}" required>
        </div>
        <div class="form-group">
            <label for="department">Department</label>
            <input type="text" id="department" name="department" value="{{ employee.department }}" required>
        </div>
        {% if current_user.role == 'admin' %}
        <div class="form-group">
            <label for="manager_id">Manager</label>
            <select id="manager_id" name="manager_id">
                <option value="">No Manager</option>
                {% for manager in managers %}
                <option value="{{ manager.id }}" {% if employee.manager_id == manager.id %}selected{% endif %}>
                    {{ manager.name }} ({{ manager.department }})
                </option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('employees.view_employee', id=employee.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
