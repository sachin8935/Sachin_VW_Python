{% extends 'base.html' %}

{% block title %}Assign Role - Employee Portal{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Assign Role to {{ user.username }}</h2>
    <form method="POST" class="employee-form">
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" required>
                <option value="employee" {% if user.role == 'employee' %}selected{% endif %}>Employee</option>
                <option value="manager" {% if user.role == 'manager' %}selected{% endif %}>Manager</option>
                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>
        <div class="form-group">
            <label for="employee_id">Link to Employee Profile</label>
            <select id="employee_id" name="employee_id">
                <option value="">No Link</option>
                {% for employee in employees %}
                <option value="{{ employee.id }}" {% if user.employee_id == employee.id %}selected{% endif %}>
                    {{ employee.name }} ({{ employee.department }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('employees.manage_users') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
