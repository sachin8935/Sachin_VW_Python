<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Explorer - Flask Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0f23;
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle { color: #888; font-size: 1rem; }
        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .api-btn {
            padding: 18px 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .api-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .api-btn .icon { font-size: 28px; }
        .btn-user { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-advice { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn-cat { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #000; }
        .btn-activity { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #000; }
        .btn-crypto { background: linear-gradient(135deg, #fa709a, #fee140); color: #000; }
        .btn-trivia { background: linear-gradient(135deg, #a8edea, #fed6e3); color: #000; }
        .result-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 300px;
        }
        .welcome-state { text-align: center; padding: 60px 20px; }
        .welcome-state h2 { font-size: 1.8rem; margin-bottom: 15px; color: #fff; }
        .welcome-state p { color: #888; }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            gap: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #ff6b6b;
        }
        .user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
        }
        .user-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #667eea;
            box-shadow: 0 0 30px rgba(102,126,234,0.5);
        }
        .user-name { font-size: 1.5rem; font-weight: 600; }
        .user-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            margin-top: 10px;
        }
        .info-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
        }
        .info-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .advice-card { text-align: center; padding: 40px 20px; }
        .advice-text {
            font-size: 1.6rem;
            line-height: 1.6;
            font-style: italic;
            color: #f5576c;
        }
        .advice-id { margin-top: 20px; color: #666; }
        .cat-card { text-align: center; padding: 40px 20px; }
        .cat-emoji { font-size: 80px; margin-bottom: 20px; }
        .cat-fact { font-size: 1.3rem; line-height: 1.6; color: #4facfe; }
        .activity-card { text-align: center; padding: 40px 20px; }
        .activity-name { font-size: 1.5rem; color: #43e97b; margin-bottom: 20px; }
        .activity-details { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .activity-badge {
            background: rgba(67,233,123,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
        }
        .crypto-card {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .crypto-item {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        .crypto-name { font-size: 1.2rem; margin-bottom: 15px; }
        .crypto-price { font-size: 2rem; font-weight: 700; color: #fee140; }
        .crypto-inr { color: #888; margin-top: 10px; }
        .trivia-card { text-align: center; padding: 30px 20px; }
        .trivia-category {
            background: rgba(168,237,234,0.2);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            color: #a8edea;
            margin-bottom: 20px;
        }
        .trivia-question { font-size: 1.4rem; margin-bottom: 25px; line-height: 1.5; }
        .trivia-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        .trivia-option {
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .trivia-option:hover { background: rgba(255,255,255,0.1); border-color: #a8edea; }
        .trivia-option.correct { background: rgba(67,233,123,0.3); border-color: #43e97b; }
        .trivia-option.wrong { background: rgba(255,107,107,0.3); border-color: #ff6b6b; }
        footer { text-align: center; margin-top: 40px; color: #555; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>API Explorer</h1>
            <p class="subtitle">Fetch real-time data from various APIs using Promises</p>
        </header>
        <div class="api-grid">
            <button class="api-btn btn-user" onclick="fetchRandomUser()">
                <span class="icon">👤</span><span>Random User</span>
            </button>
            <button class="api-btn btn-advice" onclick="fetchAdvice()">
                <span class="icon">💡</span><span>Life Advice</span>
            </button>
            <button class="api-btn btn-cat" onclick="fetchCatFact()">
                <span class="icon">🐱</span><span>Cat Fact</span>
            </button>
            <button class="api-btn btn-activity" onclick="fetchActivity()">
                <span class="icon">🎯</span><span>Random Activity</span>
            </button>
            <button class="api-btn btn-crypto" onclick="fetchCryptoPrice()">
                <span class="icon">₿</span><span>Crypto Prices</span>
            </button>
            <button class="api-btn btn-trivia" onclick="fetchTrivia()">
                <span class="icon">❓</span><span>Trivia Quiz</span>
            </button>
        </div>
        <div class="result-card">
            <div id="result">
                <div class="welcome-state">
                    <h2>Welcome! 👋</h2>
                    <p>Click any button above to fetch live data from external APIs</p>
                </div>
            </div>
        </div>
        <footer>Built with Flask & JavaScript Promises</footer>
    </div>

    <script>
        const resultDiv = document.getElementById('result');
        let currentAnswer = '';

        function showLoading() {
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Fetching data...</p></div>';
        }

        function showError(message) {
            resultDiv.innerHTML = '<div class="error-box">Error: ' + message + '</div>';
        }

        // Fetch Random User - Using Promise chain
        function fetchRandomUser() {
            showLoading();
            fetch('/api/random-user')
                .then(function(response) {
                    if (!response.ok) throw new Error('Network error');
                    return response.json();
                })
                .then(function(data) {
                    if (data.success) {
                        const user = data.data;
                        resultDiv.innerHTML = '<div class="user-card">' +
                            '<img src="' + user.picture.large + '" alt="User" class="user-avatar">' +
                            '<div class="user-name">' + user.name.first + ' ' + user.name.last + '</div>' +
                            '<div class="user-info">' +
                            '<div class="info-item"><div class="info-label">📧 Email</div><div>' + user.email + '</div></div>' +
                            '<div class="info-item"><div class="info-label">📍 Location</div><div>' + user.location.city + ', ' + user.location.country + '</div></div>' +
                            '<div class="info-item"><div class="info-label">📞 Phone</div><div>' + user.phone + '</div></div>' +
                            '<div class="info-item"><div class="info-label">🎂 Age</div><div>' + user.dob.age + ' years old</div></div>' +
                            '</div></div>';
                    } else {
                        showError(data.error);
                    }
                })
                .catch(function(error) {
                    showError(error.message);
                });
        }

        // Fetch Advice - Using custom Promise
        function fetchAdvice() {
            showLoading();
            var getAdvice = new Promise(function(resolve, reject) {
                fetch('/api/advice')
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        if (data.success) {
                            resolve(data.data);
                        } else {
                            reject(data.error);
                        }
                    })
                    .catch(function(err) { reject(err.message); });
            });

            getAdvice
                .then(function(advice) {
                    resultDiv.innerHTML = '<div class="advice-card">' +
                        '<p class="advice-text">"' + advice.advice + '"</p>' +
                        '<p class="advice-id">Advice #' + advice.id + '</p></div>';
                })
                .catch(function(error) {
                    showError(error);
                });
        }

        // Fetch Cat Fact - Using Promise
        function fetchCatFact() {
            showLoading();
            fetch('/api/cat-fact')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        resultDiv.innerHTML = '<div class="cat-card">' +
                            '<div class="cat-emoji">🐱</div>' +
                            '<p class="cat-fact">' + data.data.fact + '</p></div>';
                    } else {
                        showError(data.error);
                    }
                })
                .catch(function(error) {
                    showError(error.message);
                });
        }

        // Fetch Activity - Using async/await (Promise-based)
        async function fetchActivity() {
            showLoading();
            try {
                const response = await fetch('/api/activity');
                const data = await response.json();
                if (data.success) {
                    const activity = data.data;
                    resultDiv.innerHTML = '<div class="activity-card">' +
                        '<div class="activity-name">' + activity.activity + '</div>' +
                        '<div class="activity-details">' +
                        '<span class="activity-badge">👥 ' + activity.participants + ' participant(s)</span>' +
                        '<span class="activity-badge">📂 ' + activity.type + '</span>' +
                        '</div></div>';
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError(error.message);
            }
        }

        // Fetch Crypto Prices - Using Promise.resolve chain
        function fetchCryptoPrice() {
            showLoading();
            Promise.resolve()
                .then(function() { return fetch('/api/bitcoin-price'); })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        const prices = data.data;
                        resultDiv.innerHTML = '<div class="crypto-card">' +
                            '<div class="crypto-item">' +
                            '<div class="crypto-name">₿ Bitcoin</div>' +
                            '<div class="crypto-price">$' + prices.bitcoin.usd.toLocaleString() + '</div>' +
                            '<div class="crypto-inr">₹' + prices.bitcoin.inr.toLocaleString() + '</div></div>' +
                            '<div class="crypto-item">' +
                            '<div class="crypto-name">Ξ Ethereum</div>' +
                            '<div class="crypto-price">$' + prices.ethereum.usd.toLocaleString() + '</div>' +
                            '<div class="crypto-inr">₹' + prices.ethereum.inr.toLocaleString() + '</div></div></div>';
                    } else {
                        showError(data.error);
                    }
                })
                .catch(function(error) {
                    showError(error.message);
                });
        }

        // Fetch Trivia - Using Promise with interactive quiz
        function fetchTrivia() {
            showLoading();
            fetch('/api/trivia')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        const trivia = data.data;
                        currentAnswer = trivia.correct_answer;
                        const answers = trivia.incorrect_answers.concat([trivia.correct_answer]);
                        // Shuffle
                        for (let i = answers.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [answers[i], answers[j]] = [answers[j], answers[i]];
                        }
                        
                        function decodeHTML(html) {
                            const txt = document.createElement('textarea');
                            txt.innerHTML = html;
                            return txt.value;
                        }
                        
                        let optionsHtml = '';
                        answers.forEach(function(ans) {
                            const decoded = decodeHTML(ans);
                            optionsHtml += '<div class="trivia-option" onclick="checkAnswer(this, \'' + decoded.replace(/'/g, "\\'") + '\')">' + decoded + '</div>';
                        });
                        
                        resultDiv.innerHTML = '<div class="trivia-card">' +
                            '<div class="trivia-category">' + decodeHTML(trivia.category) + '</div>' +
                            '<p class="trivia-question">' + decodeHTML(trivia.question) + '</p>' +
                            '<div class="trivia-options">' + optionsHtml + '</div></div>';
                    } else {
                        showError(data.error);
                    }
                })
                .catch(function(error) {
                    showError(error.message);
                });
        }

        function checkAnswer(element, selected) {
            const options = document.querySelectorAll('.trivia-option');
            const decoded = document.createElement('textarea');
            decoded.innerHTML = currentAnswer;
            options.forEach(function(opt) {
                opt.style.pointerEvents = 'none';
                if (opt.textContent.trim() === decoded.value) {
                    opt.classList.add('correct');
                }
            });
            if (selected !== decoded.value) {
                element.classList.add('wrong');
            }
        }
    </script>
</body>
</html>
